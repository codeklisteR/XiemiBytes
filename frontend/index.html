<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="XiemiBytes - Coffee & Tea Shop">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <title>XiemiBytes</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <!-- Header -->
    <header id="header" class="header">
        <!-- Injected by header.js -->
    </header>

    <!-- Admin Sidebar -->
    <aside id="sidebar" class="sidebar-container" style="display: none;">
        <!-- Injected by header.js or admin pages -->
    </aside>

    <!-- Loader (Global) -->
    <div class="loading-spinner" id="loader" style="display: none;">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <!-- Main Content Area -->
    <main id="app" class="app-container">
    </main>

    <!-- Modal Container -->
    <div id="modal-root"></div>

    <!-- Toast Container -->
    <div id="toast-root" class="toast-container"></div>

    <!-- CONFIGURATION (Load First) -->
    <script src="js/config.js"></script>
    <script src="js/constants.js"></script>

    <!-- MOCK DATA -->
    <script src="js/data/categories.js"></script>
    <script src="js/data/products.js"></script>
    <script src="js/data/orders.js"></script>
    <script src="js/data/vouchers.js"></script>

    <!-- CORE MODULES -->
    <script src="js/core/utils.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/router.js"></script>

    <!-- BUSINESS LOGIC MODULES -->
    <script src="js/modules/auth.js"></script>
    <script src="js/modules/product.js"></script>
    <script src="js/modules/cart.js"></script>
    <script src="js/modules/orders.js"></script>
    <script src="js/modules/vouchers.js"></script>
    <script src="js/modules/loyalty.js"></script>
    <script src="js/modules/admin.js"></script>

    <!-- UI COMPONENTS -->
    <script src="js/ui/header.js"></script>
    <script src="js/ui/modal.js"></script>
    <script src="js/ui/toast.js"></script>
    <script src="js/ui/loader.js"></script>

    <!-- PAGE HANDLERS -->
    <script src="js/pages/home.js"></script>
    <script src="js/pages/products.js"></script>
    <script src="js/pages/cart.js"></script>
    <script src="js/pages/checkout.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/register.js"></script>
    <script src="js/pages/profile.js"></script>
    <script src="js/pages/orders.js"></script>
    <script src="js/pages/admin-dashboard.js"></script>
    <script src="js/pages/admin-pos.js"></script>
    <script src="js/pages/admin-orders.js"></script>
    <script src="js/pages/admin-products.js"></script>
    <script src="js/pages/admin-vouchers.js"></script>
    <script src="js/pages/admin-reports.js"></script>
    <script src="js/pages/admin-users.js"></script>

    <!-- APP INITIALIZATION (Load Last) -->
    <script src="js/app.js"></script>
</body>

</html>
